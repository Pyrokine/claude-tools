name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mcp-claude-history
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcp-claude-history
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-claude-history
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcp-claude-history.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        working-directory: mcp-claude-history
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp mcp-claude-history/target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../mcp-claude-history-${{ matrix.target }}.zip ${{ matrix.artifact }}
          else
            tar czf ../mcp-claude-history-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcp-claude-history-${{ matrix.target }}
          path: mcp-claude-history-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/*
