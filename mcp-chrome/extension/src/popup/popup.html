<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta content='width=device-width, initial-scale=1.0' name='viewport'>
    <title>MCP Chrome</title>
    <link href='./popup.css' rel='stylesheet'>
</head>
<body>
<div class='container'>
    <h1>MCP Chrome</h1>

    <div class='status-section'>
        <div class='status-indicator' id='statusIndicator'>
            <span class='status-dot'></span>
            <span class='status-text' id='statusText'>检查中...</span>
        </div>
    </div>

    <div class='button-section'>
        <button class='btn btn-primary' id='connectBtn'>连接</button>
        <button class='btn btn-secondary' disabled id='disconnectBtn'>断开</button>
    </div>

    <div class='auth-section'>
        <label class='auth-label' for='pairingTokenInput'>Pairing token（可选）</label>
        <input autocomplete='off' class='auth-input' id='pairingTokenInput' placeholder='未配置时使用本地信任模式'
               type='password'>
        <button class='btn btn-secondary' id='saveTokenBtn'>保存 token</button>
        <p class='auth-help' id='authHelp'>配置后只连接使用同一 token 的 MCP Server</p>
    </div>

    <div class='info-section'>
        <p class='info-text'>
            通过 WebSocket 与 MCP Server 通信
        </p>
        <p class='info-text'>
            服务端口范围：19222-19299
        </p>
    </div>
</div>

<script src='./popup.ts' type='module'></script>
</body>
</html>
